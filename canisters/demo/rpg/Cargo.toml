[package]
name = "canister_demo_rpg"
edition = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
publish = false

[package.metadata.cargo-machete]
ignored = ["candid"]

[lib]
crate-type = ["cdylib"]

[features]
default = ["sql", "diagnostics"]
candid-export = []
sql = ["icydb/sql"]
diagnostics = ["icydb/diagnostics"]

[dependencies]
candid = { workspace = true }
ic-cdk = { workspace = true }
icydb = { path = "../../../crates/icydb", default-features = false }
icydb-testing-demo-rpg-fixtures = { workspace = true }

[build-dependencies]
icydb = { path = "../../../crates/icydb", default-features = false }
icydb-config = { workspace = true }
icydb-testing-demo-rpg-fixtures = { workspace = true }
icydb-testing-wasm-helpers = { workspace = true }

[lints]
workspace = true
