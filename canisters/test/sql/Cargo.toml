[package]
name = "canister_test_sql"
edition = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
publish = false

[package.metadata.cargo-machete]
ignored = ["candid"]

[lib]
crate-type = ["cdylib"]

[features]
default = ["sql", "sql-explain", "diagnostics"]
candid-export = []
sql = ["icydb/sql"]
sql-explain = ["icydb/sql-explain"]
diagnostics = ["icydb/diagnostics"]

[dependencies]
candid = { workspace = true }
ic-cdk = { workspace = true }
icydb = { path = "../../../crates/icydb", default-features = false }
icydb-testing-test-sql-fixtures = { workspace = true }

[build-dependencies]
icydb = { path = "../../../crates/icydb", default-features = false }
icydb-testing-test-sql-fixtures = { workspace = true }
icydb-testing-wasm-helpers = { workspace = true }

[lints]
workspace = true
