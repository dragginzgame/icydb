[package]
name = "canister_audit_minimal"
edition = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
publish = false

[package.metadata.cargo-machete]
ignored = ["candid", "icydb-testing-audit-minimal-fixtures"]

[lib]
crate-type = ["cdylib"]

[features]
default = ["sql"]
sql = ["icydb/sql"]

[dependencies]
candid = { workspace = true }
ic-cdk = { workspace = true }
icydb = { path = "../../../crates/icydb", default-features = false }
icydb-testing-audit-minimal-fixtures = { workspace = true }

[build-dependencies]
icydb = { path = "../../../crates/icydb", default-features = false }
icydb-config-build = { workspace = true }
icydb-testing-audit-minimal-fixtures = { workspace = true }
icydb-testing-wasm-helpers = { workspace = true }

[lints]
workspace = true
