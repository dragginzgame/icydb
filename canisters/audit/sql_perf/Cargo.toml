[package]
name = "canister_audit_sql_perf"
edition = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
publish = false

[lib]
crate-type = ["cdylib"]

[features]
default = ["sql", "sql-explain", "diagnostics"]
candid-export = []
sql = ["icydb/sql"]
sql-explain = ["icydb/sql-explain"]
diagnostics = ["icydb/diagnostics"]

[dependencies]
candid = { workspace = true }
ic-cdk = { workspace = true }
icydb = { path = "../../../crates/icydb", default-features = false, features = ["sql", "sql-explain", "diagnostics"] }
icydb-testing-audit-sql-perf-fixtures = { workspace = true }

[build-dependencies]
icydb-config = { workspace = true }
icydb-testing-audit-sql-perf-fixtures = { workspace = true }
icydb-testing-wasm-helpers = { workspace = true }

[lints]
workspace = true
