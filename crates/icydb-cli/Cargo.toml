[package]
name = "icydb-cli"
edition = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
license = { workspace = true }
description = "Developer CLI tools for IcyDB"
repository = { workspace = true }
authors = { workspace = true }

[[bin]]
name = "icydb"
path = "src/main.rs"

[dependencies]
