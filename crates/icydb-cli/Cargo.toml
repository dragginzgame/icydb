clap = { version = "4.6.1", default-features = false, features = ["derive", "env", "error-context", "help", "std", "usage"] }
icydb = { workspace = true }
rustyline = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[lints]
workspace = true
