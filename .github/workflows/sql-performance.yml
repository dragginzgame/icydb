name: SQL Performance Evidence

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      baseline_run_id:
        description: "Reviewed SQL Performance Evidence workflow run ID"
        required: false
        type: string
      subject_revision:
        description: "Exact commit SHA to measure for a reviewed previous-source bridge"
        required: false
        type: string
      calibration_cohort:
        description: "Reviewer-chosen ID for an explicit three-run initial calibration"
        required: false
        type: string
      calibration_run:
        description: "Initial-calibration run ordinal: 1, 2, or 3"
        required: false
        type: string
      calibration_subject_run_id:
        description: "Ordinal-1 run whose exact SQL performance Wasm is reused by ordinals 2 and 3"
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: sql-performance-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_HOME: ${{ github.workspace }}/.cache/cargo/icydb
  CARGO_TARGET_DIR: ${{ github.workspace }}/target/icydb
  CARGO_TERM_COLOR: always
  IC_TESTKIT_ALLOW_POCKET_IC_DOWNLOAD: "1"
  REVIEWED_SQL_PERF_BASELINE_RUN_ID: ${{ inputs.baseline_run_id || vars.ICYDB_SQL_PERF_BASELINE_RUN_ID }}
  SQL_PERF_SUBJECT_REVISION: ${{ inputs.subject_revision || github.sha }}
  SQL_PERF_CALIBRATION_COHORT: ${{ inputs.calibration_cohort }}
  SQL_PERF_CALIBRATION_RUN: ${{ inputs.calibration_run }}
  SQL_PERF_CALIBRATION_SUBJECT_RUN_ID: ${{ inputs.calibration_subject_run_id }}
  RUST_CURRENT: "1.97.0"
  TMPDIR: ${{ github.workspace }}/.cache

jobs:
  wasm:
    name: Prepare shared SQL performance subject
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SQL_PERF_SUBJECT_REVISION }}
      - name: Require one immutable subject and exact calibration mode
        run: |
          [[ "$SQL_PERF_SUBJECT_REVISION" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$SQL_PERF_SUBJECT_REVISION"
          if [ -z "$SQL_PERF_CALIBRATION_COHORT" ]; then
            test -z "$SQL_PERF_CALIBRATION_RUN"
            test -z "$SQL_PERF_CALIBRATION_SUBJECT_RUN_ID"
          elif [ "$SQL_PERF_CALIBRATION_RUN" = "1" ]; then
            test -z "$SQL_PERF_CALIBRATION_SUBJECT_RUN_ID"
          else
            case "$SQL_PERF_CALIBRATION_RUN" in
              2|3) test -n "$SQL_PERF_CALIBRATION_SUBJECT_RUN_ID" ;;
              *) exit 1 ;;
            esac
          fi
      - uses: dtolnay/rust-toolchain@v1
        if: env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID == ''
        with:
          toolchain: ${{ env.RUST_CURRENT }}
      - name: Install WASM target
        if: env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID == ''
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        if: env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID == ''
        with:
          workspaces: |
            . -> target/icydb
          cache-targets: "false"
      - name: Prepare local cache
        if: env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID == ''
        run: mkdir -p "$TMPDIR"
      - name: Verify reused calibration run authority
        if: env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_path="repos/${GITHUB_REPOSITORY}/actions/runs/${SQL_PERF_CALIBRATION_SUBJECT_RUN_ID}"
          test "$(gh api "$run_path" --jq '.conclusion')" = "success"
          test "$(gh api "$run_path" --jq '.head_sha')" = "$GITHUB_SHA"
          test "$(gh api "$run_path" --jq '.path')" = ".github/workflows/sql-performance.yml"
      - name: Download exact calibration subject
        if: env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID != ''
        uses: actions/download-artifact@v4
        with:
          name: sql-perf-wasm
          path: artifacts/perf-audit
          github-token: ${{ github.token }}
          run-id: ${{ env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID }}
      - name: Download exact calibration subject identity
        if: env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID != ''
        uses: actions/download-artifact@v4
        with:
          name: sql-perf-p1-merged
          path: artifacts/perf-calibration-subject
          github-token: ${{ github.token }}
          run-id: ${{ env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID }}
      - name: Verify reused calibration subject identity
        if: env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID != ''
        run: |
          report=artifacts/perf-calibration-subject/sql_perf_deterministic_matrix.json
          test "$(jq -r '.environment.subject.source_revision' "$report")" = "$SQL_PERF_SUBJECT_REVISION"
          expected_wasm_sha="$(jq -r '.environment.subject.raw_wasm_sha256' "$report")"
          actual_wasm_sha="$(sha256sum artifacts/perf-audit/sql_perf_canister.wasm | cut -d ' ' -f 1)"
          test "$actual_wasm_sha" = "$expected_wasm_sha"
      - if: env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID == ''
        run: cargo fetch --locked
      - name: Build shared wasm-release subject
        if: env.SQL_PERF_CALIBRATION_SUBJECT_RUN_ID == ''
        run: make build-sql-perf-wasm
      - name: Require the exact shared Wasm
        run: test -s artifacts/perf-audit/sql_perf_canister.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: sql-perf-wasm
          path: artifacts/perf-audit/sql_perf_canister.wasm
          if-no-files-found: error
          retention-days: 14

  p1:
    name: P1 shard ${{ matrix.shard }}
    needs: wasm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SQL_PERF_SUBJECT_REVISION }}
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_CURRENT }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target/icydb
          cache-targets: "false"
      - name: Prepare local cache
        run: mkdir -p "$TMPDIR"
      - uses: actions/download-artifact@v4
        with:
          name: sql-perf-wasm
          path: artifacts/perf-audit
      - run: cargo fetch --locked
      - name: Capture P1 shard
        run: make test-sql-perf-p1-shard P1_SHARD=${{ matrix.shard }}
      - uses: actions/upload-artifact@v4
        with:
          name: sql-perf-p1-shard-${{ matrix.shard }}
          path: artifacts/perf-audit/sql_perf_p1_shards/p1-shard-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 14

  scale:
    name: Scale shard ${{ matrix.shard }}
    needs: wasm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SQL_PERF_SUBJECT_REVISION }}
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_CURRENT }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target/icydb
          cache-targets: "false"
      - name: Prepare local cache
        run: mkdir -p "$TMPDIR"
      - uses: actions/download-artifact@v4
        with:
          name: sql-perf-wasm
          path: artifacts/perf-audit
      - run: cargo fetch --locked
      - name: Capture scale shard
        run: make test-sql-perf-scale-shard SCALE_SHARD=${{ matrix.shard }}
      - uses: actions/upload-artifact@v4
        with:
          name: sql-perf-scale-shard-${{ matrix.shard }}
          path: artifacts/perf-audit/sql_perf_scale_shards/scale-shard-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 14

  p1_merge:
    name: Merge P1 and scale evidence
    needs: [p1, scale]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SQL_PERF_SUBJECT_REVISION }}
      - name: Require a reviewed baseline run
        if: env.SQL_PERF_CALIBRATION_COHORT == ''
        run: test -n "$REVIEWED_SQL_PERF_BASELINE_RUN_ID"
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_CURRENT }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target/icydb
          cache-targets: "false"
      - uses: actions/download-artifact@v4
        with:
          pattern: sql-perf-p1-shard-*
          path: artifacts/perf-audit/sql_perf_p1_shards
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: sql-perf-scale-shard-*
          path: artifacts/perf-audit/sql_perf_scale_shards
          merge-multiple: true
      - name: Download reviewed P1 baseline
        if: env.SQL_PERF_CALIBRATION_COHORT == ''
        uses: actions/download-artifact@v4
        with:
          name: sql-perf-tier-d-current
          path: artifacts/perf-baseline
          github-token: ${{ github.token }}
          run-id: ${{ env.REVIEWED_SQL_PERF_BASELINE_RUN_ID }}
      - run: cargo fetch --locked
      - name: Merge complete P1 and scale receipts
        run: |
          if [ -n "$SQL_PERF_CALIBRATION_COHORT" ]; then
            make test-sql-perf-p1-merge \
              PERF_CALIBRATION_COHORT="$SQL_PERF_CALIBRATION_COHORT" \
              PERF_CALIBRATION_RUN="$SQL_PERF_CALIBRATION_RUN"
          else
            make test-sql-perf-p1-merge \
              P1_BASELINE_PATH=artifacts/perf-baseline/sql_perf_deterministic_matrix.json
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: sql-perf-p1-merged
          path: |
            artifacts/perf-audit/sql_perf_deterministic_matrix.*
            artifacts/perf-audit/sql_perf_p2_candidates.json
            artifacts/perf-audit/sql_perf_scale_report.json
          if-no-files-found: error
          retention-days: 14

  p2:
    name: P2 shard ${{ matrix.shard }}
    needs: [p1_merge, wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SQL_PERF_SUBJECT_REVISION }}
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_CURRENT }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target/icydb
          cache-targets: "false"
      - name: Prepare local cache
        run: mkdir -p "$TMPDIR"
      - uses: actions/download-artifact@v4
        with:
          name: sql-perf-p1-merged
          path: artifacts/perf-audit
      - uses: actions/download-artifact@v4
        with:
          name: sql-perf-wasm
          path: artifacts/perf-audit
      - run: cargo fetch --locked
      - name: Confirm P2 shard
        run: make test-sql-perf-p2-shard P2_SHARD=${{ matrix.shard }}
      - uses: actions/upload-artifact@v4
        with:
          name: sql-perf-p2-shard-${{ matrix.shard }}
          path: artifacts/perf-audit/sql_perf_p2_shards/p2-shard-${{ matrix.shard }}.json
          if-no-files-found: error
          retention-days: 14

  instrumentation:
    name: Attribution overhead calibration
    needs: [p1_merge, wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SQL_PERF_SUBJECT_REVISION }}
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_CURRENT }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target/icydb
          cache-targets: "false"
      - name: Prepare local cache
        run: mkdir -p "$TMPDIR"
      - uses: actions/download-artifact@v4
        with:
          name: sql-perf-wasm
          path: artifacts/perf-audit
      - run: cargo fetch --locked
      - name: Capture attributed versus total-only overhead
        run: make test-sql-perf-instrumentation
      - uses: actions/upload-artifact@v4
        with:
          name: sql-perf-instrumentation
          path: artifacts/perf-audit/sql_perf_instrumentation.json
          if-no-files-found: error
          retention-days: 14

  p2_merge:
    name: Merge P2 evidence
    needs: p2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SQL_PERF_SUBJECT_REVISION }}
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_CURRENT }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target/icydb
          cache-targets: "false"
      - uses: actions/download-artifact@v4
        with:
          name: sql-perf-p1-merged
          path: artifacts/perf-audit
      - uses: actions/download-artifact@v4
        with:
          pattern: sql-perf-p2-shard-*
          path: artifacts/perf-audit/sql_perf_p2_shards
          merge-multiple: true
      - run: cargo fetch --locked
      - name: Merge complete P2 receipts
        run: make test-sql-perf-p2-merge
      - uses: actions/upload-artifact@v4
        with:
          name: sql-perf-p2-merged
          path: artifacts/perf-audit/sql_perf_p2_report.json
          if-no-files-found: error
          retention-days: 14

  current_evidence_bundle:
    name: Bundle current Tier D evidence
    needs: [p2_merge, instrumentation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sql-perf-p1-merged
          path: artifacts/perf-audit
      - uses: actions/download-artifact@v4
        with:
          name: sql-perf-p2-merged
          path: artifacts/perf-audit
      - uses: actions/download-artifact@v4
        with:
          name: sql-perf-instrumentation
          path: artifacts/perf-audit
      - uses: actions/upload-artifact@v4
        with:
          name: sql-perf-tier-d-current
          path: artifacts/perf-audit/*
          if-no-files-found: error
          retention-days: 90

  baseline_gate:
    name: Gate reviewed Tier D baseline
    needs: current_evidence_bundle
    if: inputs.calibration_cohort == ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SQL_PERF_SUBJECT_REVISION }}
      - name: Require a reviewed baseline run
        run: test -n "$REVIEWED_SQL_PERF_BASELINE_RUN_ID"
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_CURRENT }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target/icydb
          cache-targets: "false"
      - uses: actions/download-artifact@v4
        with:
          name: sql-perf-tier-d-current
          path: artifacts/perf-current
      - name: Download reviewed Tier D baseline
        uses: actions/download-artifact@v4
        with:
          name: sql-perf-tier-d-current
          path: artifacts/perf-baseline
          github-token: ${{ github.token }}
          run-id: ${{ env.REVIEWED_SQL_PERF_BASELINE_RUN_ID }}
      - run: cargo fetch --locked
      - name: Compare confirmed current evidence to the reviewed baseline
        run: >-
          make test-sql-perf-baseline
          P2_BASELINE_PATH=artifacts/perf-baseline/sql_perf_p2_report.json
          P2_CURRENT_PATH=artifacts/perf-current/sql_perf_p2_report.json
          SCALE_BASELINE_PATH=artifacts/perf-baseline/sql_perf_scale_report.json
          SCALE_CURRENT_PATH=artifacts/perf-current/sql_perf_scale_report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sql-perf-tier-d-comparison
          path: artifacts/perf-audit/sql_perf_comparison.json
          if-no-files-found: error
          retention-days: 90
