name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          # Restrict cache scanning to the real workspace root.
          # trybuild generates temporary Cargo.toml files under target/tests,
          # and scanning those can make the cache action probe missing paths
          # like target/tests/target in post-job cleanup.
          workspaces: |
            . -> target
          # Keep registry/git caching, but avoid unstable target-dir probing
          # from ephemeral trybuild workspaces under `target/tests`.
          cache-targets: "false"
      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - name: Resolve PocketIC server binary
        run: |
          echo "POCKET_IC_BIN=$(bash scripts/ci/ensure-pocket-ic-bin.sh)" >> "$GITHUB_ENV"
      - run: bash scripts/ci/validate-workflow-packages.sh .github/workflows/ci.yml
      - run: bash scripts/ci/check-index-range-spec-invariants.sh
      - run: bash scripts/ci/check-memory-id-invariants.sh
      - run: bash scripts/ci/check-field-projection-invariants.sh
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --exclude canister_quickstart --exclude canister_minimal --exclude icydb-testing-integration -- -D warnings
      - run: cargo test --workspace --all-targets --exclude canister_quickstart --exclude canister_minimal --exclude icydb-testing-integration --verbose
      - run: cargo test -p icydb-testing-integration --test sql_canister --verbose

  wasm_size_report:
    runs-on: ubuntu-latest
    needs: check
    env:
      CARGO_TERM_COLOR: always
      WASM_PROFILE: wasm-release
      WASM_CANISTER_NAME: minimal
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.94.0
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-targets: "false"
      - name: Install wasm reporting tools
        run: cargo install candid-extractor ic-wasm --locked
      - name: Report minimal wasm size
        run: bash scripts/ci/wasm-size-report.sh
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-size-report
          path: artifacts/wasm-size/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.94.0
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-targets: "false"
      - run: cargo build -p canister_quickstart --target wasm32-unknown-unknown --profile wasm-release --locked
      - run: |
          mkdir -p artifacts
          target_dir="$(cargo metadata --format-version=1 --no-deps \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["target_directory"])')"
          wasm="${target_dir}/wasm32-unknown-unknown/wasm-release/canister_quickstart.wasm"
          if [ ! -f "$wasm" ]; then
            echo "Expected wasm artifact missing: $wasm" >&2
            exit 1
          fi
          cp "$wasm" artifacts/quickstart.wasm

          cargo install candid-extractor --locked
          did="artifacts/quickstart.did"
          if candid-extractor "$wasm" > "$did"; then
            echo "Extracted $did"
          else
            echo "Skipping candid extraction for $wasm (no candid service metadata)."
            rm -f "$did"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: artifacts/*
          if-no-files-found: warn
