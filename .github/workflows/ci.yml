name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACTIONLINT_VERSION: "1.7.8"
  CARGO_TERM_COLOR: always
  RUST_CURRENT: "1.97.0"
  RUST_MSRV: "1.88.0"

jobs:
  dependency_msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_MSRV }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-targets: "false"
      - run: cargo fetch --locked
      - run: cargo check --locked -p icydb --no-default-features
      - run: cargo check --locked -p icydb --no-default-features --features sql
      - run: cargo check --locked -p icydb --no-default-features --features diagnostics
      - run: cargo check --locked -p icydb
      - run: cargo check --locked -p icydb-core
      - run: cargo check --locked -p icydb-core --no-default-features
      - run: cargo check --locked -p icydb-core --no-default-features --features sql
      - run: cargo check --locked -p icydb-core --no-default-features --features diagnostics

  check:
    runs-on: ubuntu-latest
    env:
      IC_TESTKIT_ALLOW_POCKET_IC_DOWNLOAD: "1"
      TMPDIR: ${{ github.workspace }}/.cache
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          bin="$(bash scripts/ci/install-actionlint.sh "$ACTIONLINT_VERSION")"
          echo "ACTIONLINT_BIN=$bin" >> "$GITHUB_ENV"
      - name: Lint GitHub Actions workflows
        run: make lint-workflows
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_CURRENT }}
          components: rustfmt, clippy
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          # Restrict cache scanning to the real workspace root.
          # trybuild generates temporary Cargo.toml files under target/tests,
          # and scanning those can make the cache action probe missing paths
          # like target/tests/target in post-job cleanup.
          workspaces: |
            . -> target
          # Keep registry/git caching, but avoid unstable target-dir probing
          # from ephemeral trybuild workspaces under `target/tests`.
          cache-targets: "false"
      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - run: cargo fetch --locked
      - run: make check-invariants
      - run: cargo fmt --all -- --check
      - run: cargo check --locked -p icydb --no-default-features
      - run: cargo check --locked -p icydb-core --no-default-features
      - run: cargo check --locked --workspace --no-default-features
      - run: cargo test --locked -p icydb --no-default-features
      - run: cargo test --locked -p icydb-core --no-default-features
      - run: cargo check --locked -p icydb --no-default-features --features sql
      - run: cargo check --locked -p icydb-core --no-default-features --features sql
      - run: cargo clippy --locked -p icydb-core --no-default-features --features sql -- -D warnings
      - run: cargo check --locked -p icydb --no-default-features --features diagnostics
      - run: cargo check --locked -p icydb-core --no-default-features --features diagnostics
      - run: cargo clippy --locked -p icydb-core --no-default-features --features diagnostics -- -D warnings
      - run: cargo clippy --locked --workspace --all-targets --exclude icydb-testing-integration -- -D warnings
      - run: cargo clippy --locked -p icydb-testing-integration --test sql_correctness --test sql_canister -- -D warnings
      - name: Run required Tier A SQL evidence within its hard timeout
        run: |
          timeout --signal=TERM --kill-after=30s 600s bash -euo pipefail -c '
            cargo test --locked -p icydb-core --no-default-features --features sql db::session::tests::sqlite_reference --verbose
            cargo test --locked -p icydb-core --no-default-features --features sql db::session::tests::mutation_reference --verbose
            cargo test --locked -p icydb-testing-integration --test sql_correctness --verbose
          '
      - name: Run required Tier B live SQL evidence within its hard timeout
        run: timeout --signal=TERM --kill-after=30s 600s cargo test --locked -p icydb-testing-integration --test sql_canister --verbose
      - run: cargo test --locked --workspace --all-targets --exclude icydb-testing-integration --verbose

  wasm_size_report:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_CURRENT }}
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-targets: "false"
      - run: cargo fetch --locked
      - name: Install wasm reporting tools
        run: cargo install candid-extractor ic-wasm --locked
      - name: Report default-empty wasm size
        run: bash scripts/ci/wasm-size-report.sh --profile wasm-release --canister default_empty
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-size-report
          path: artifacts/wasm-size/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_CURRENT }}
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-targets: "false"
      - run: cargo fetch --locked
      - run: cargo build -p canister_audit_default_empty --target wasm32-unknown-unknown --profile wasm-release --locked
      - run: |
          mkdir -p artifacts
          target_dir="${CARGO_TARGET_DIR:-target}"
          wasm="${target_dir}/wasm32-unknown-unknown/wasm-release/canister_audit_default_empty.wasm"
          if [ ! -f "$wasm" ]; then
            echo "Expected wasm artifact missing: $wasm" >&2
            exit 1
          fi
          cp "$wasm" artifacts/default_empty.wasm

          cargo install candid-extractor --locked
          did="artifacts/default_empty.did"
          if candid-extractor "$wasm" > "$did"; then
            echo "Extracted $did"
          else
            echo "Skipping candid extraction for $wasm (no candid service metadata)."
            rm -f "$did"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: artifacts/*
          if-no-files-found: warn
